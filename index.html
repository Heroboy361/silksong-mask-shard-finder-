<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Silksong Mask Shard Finder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div id="lang-switch">
      <button type="button" class="lang-btn" data-lang="de">DE</button>
      <button type="button" class="lang-btn" data-lang="en">EN</button>
    </div>
    <h1>Silksong Mask Shard Finder</h1>
    <p class="subtitle" id="subtitle"></p>
  </header>

  <main>
    <section id="upload-section">
      <div id="file-info">
        <h2 id="file-info-heading"></h2>
        <p id="file-info-p1"></p>
        <p class="filepath">
          <code>%userprofile%\AppData\LocalLow\Team Cherry\Hollow Knight Silksong\</code>
        </p>
        <p class="hint" id="file-info-hint"></p>
      </div>

      <div id="dropzone">
        <p id="dropzone-text"></p>
        <input type="file" id="file-input" accept=".dat,.json" hidden />
      </div>
      <p id="error-message" class="error hidden"></p>
    </section>

    <section id="results" class="hidden">
      <div id="category-tabs"></div>

      <div id="summary-bar">
        <span id="summary">0 / 20 Mask Shards found</span>
        <div class="progress-bar">
          <div id="progress-bar-fill"></div>
        </div>
        <a id="missing-map-link" class="map-link hidden" href="#" target="_blank" rel="noopener noreferrer"></a>
      </div>

      <table id="shard-table">
        <thead>
          <tr>
            <th class="th-num"></th>
            <th class="th-act"></th>
            <th class="th-area"></th>
            <th class="th-location"></th>
            <th class="th-status"></th>
            <th class="th-map"></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <footer>
    <p id="footer-text"></p>
  </footer>

  <script src="vendor/crypto-js.min.js"></script>
  <script src="i18n.js"></script>
  <script src="data/mask-shards.js"></script>
  <script src="data/fleas.js"></script>
  <script src="data/spool-fragments.js"></script>
  <script src="app.js"></script>
</body>
</html>
